<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Domenetest</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: #f6f7f9;
      color: #1d1f23;
    }

    main {
      width: min(90vw, 520px);
      padding: 32px;
      border: 1px solid #d8dde6;
      border-radius: 8px;
      background: #ffffff;
      text-align: center;
      box-shadow: 0 12px 30px rgb(20 25 35 / 8%);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 6vw, 3rem);
    }

    p {
      margin: 0;
      font-size: 1.05rem;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #111318;
        color: #f2f4f8;
      }

      main {
        border-color: #303744;
        background: #191d25;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Domenetest</h1>
    <p>Hvis du ser denne siden, peker domenet riktig.</p>
  </main>
</body>
</html>
